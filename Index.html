<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1b3977;
    --navy-light:#2a4f8f;
    --gold:#f0af2d;
    --gold-light:#f7cc72;
    --teal:#249ec7;
    --teal-light:#5cbcdb;
    --bg:#f4f6fa;
    --card:#ffffff;
    --green:#1e8a5c;
    --red:#c0392b;
    --amber:#c9861f;
    --gray:#6b7280;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:var(--bg);
    color:#1f2937;
    min-height:100vh;
  }
  header{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy) 55%,var(--teal) 130%);
    color:#fff;
    padding:20px 20px 60px;
    text-align:center;
    position:relative;
  }
  .header-logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
  }
  .logo-badge{
    background:#fff;
    border-radius:14px;
    padding:5px 9px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.2);
  }
  .logo-badge img{
    height:40px;
    width:auto;
    display:block;
    border-radius:6px;
  }
  header h1{margin:0;font-size:20px;font-weight:800;}
  header p{margin:6px 0 0;font-size:13px;color:var(--gold-light);}

  .tabs{
    display:flex;
    max-width:520px;
    margin:-38px auto 0;
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:0 8px 24px rgba(21,34,56,.15);
    overflow:hidden;
    position:relative;
    z-index:2;
  }
  .tab-btn{
    flex:1;
    border:none;
    background:transparent;
    padding:14px 6px;
    font-family:'Cairo',sans-serif;
    font-weight:700;
    font-size:13px;
    color:var(--gray);
    cursor:pointer;
    border-bottom:3px solid transparent;
    transition:.2s;
  }
  .tab-btn.active{
    color:var(--navy);
    border-bottom:3px solid var(--gold);
    background:#faf7ee;
  }

  main{max-width:520px;margin:20px auto 60px;padding:0 16px;}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:0 2px 10px rgba(21,34,56,.06);
    margin-bottom:16px;
  }
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px;}
  select,input[type=text],input[type=date],input[type=time],textarea{
    width:100%;
    padding:11px 12px;
    border:1.5px solid #e2e6ee;
    border-radius:10px;
    font-family:'Cairo',sans-serif;
    font-size:16px;
    background:#fff;
    color:#1f2937;
  }
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--gold);}
  textarea{resize:vertical;min-height:64px;}

  .teacher-hint{
    margin:8px 2px 0;font-size:12.5px;font-weight:700;color:var(--navy);
    display:none;
  }
  .teacher-hint.show{display:block;}

  .btn{
    width:100%;
    border:none;
    border-radius:10px;
    padding:13px;
    font-family:'Cairo',sans-serif;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    transition:.15s;
  }
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-light);}
  .btn-gold{background:var(--gold);color:var(--navy);}
  .btn-gold:hover{background:var(--gold-light);}
  .btn:disabled{opacity:.55;cursor:not-allowed;}

  .student-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 4px;border-bottom:1px solid #eef0f4;
    font-size:14px;
  }
  .student-row:last-child{border-bottom:none;}
  .status-group{display:flex;gap:6px;}
  .status-opt{
    padding:9px 13px;min-height:22px;
    border-radius:20px;font-size:12.5px;font-weight:700;
    border:1.5px solid #e2e6ee;cursor:pointer;color:var(--gray);user-select:none;
  }
  .status-opt.present.selected{background:#e6f6ee;border-color:var(--green);color:var(--green);}
  .status-opt.absent.selected{background:#fdecea;border-color:var(--red);color:var(--red);}
  .status-opt.excused.selected{background:#fdf2e2;border-color:var(--amber);color:var(--amber);}

  .empty{text-align:center;color:var(--gray);font-size:13px;padding:20px 0;}

  .class-check-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
  }
  .chk{
    display:flex;align-items:center;gap:7px;
    background:#f7f8fb;border:1.5px solid #e2e6ee;border-radius:10px;
    padding:9px 10px;font-size:13px;font-weight:600;color:#374151;
    cursor:pointer;user-select:none;
  }
  .chk input{width:17px;height:17px;accent-color:var(--navy);flex-shrink:0;}
  .chk.all{
    grid-column:1 / -1;
    background:#faf5e6;border-color:var(--gold);color:var(--navy);font-weight:800;
  }
  .chk.checked{border-color:var(--navy);background:#eef2fb;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;
    font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:50;
    box-shadow:0 6px 18px rgba(0,0,0,.2);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.error{background:var(--red);}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
  .stat{
    background:var(--card);border-radius:12px;padding:12px 6px;text-align:center;
    box-shadow:0 2px 8px rgba(21,34,56,.06);
  }
  .stat .num{font-size:20px;font-weight:800;color:var(--navy);}
  .stat .lbl{font-size:11px;color:var(--gray);margin-top:2px;}
  .stat.present .num{color:var(--green);}
  .stat.absent .num{color:var(--red);}
  .stat.excused .num{color:var(--amber);}

  .list-title{font-weight:800;color:var(--navy);font-size:14px;margin:0 0 10px;}
  .list-item{
    display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid #eef0f4;font-size:13px;
  }
  .list-item:last-child{border-bottom:none;}
  .tag{background:#f4f0e2;color:var(--amber);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;}
</style>
</head>

  <h1>نظام الحضور والغياب</h1>
  <p>نادي آفاق الصيفي 2 &mdash; المرحلة الابتدائية</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="att">تسجيل الحضور</button>
  <button class="tab-btn" data-tab="dash">لوحة المتابعة</button>
</div>

<main>

  <!-- ===== تبويب الحضور ===== -->
  <section class="panel active" id="panel-att">
    <div class="card">
      <div class="field">
        <label>التاريخ</label>
        <input type="date" id="att-date">
      </div>
      <div class="field">
        <label>الفصل</label>
        <select id="att-class"><option value="">اختر الفصل</option></select>
        <p class="teacher-hint" id="att-teacher-hint"></p>
      </div>
    </div>

    <div class="card" id="att-students-card" style="display:none;">
      <div id="att-students"></div>
    </div>

    <button class="btn btn-gold" id="att-save-btn" style="display:none;">إرسال</button>
  </section>

  <!-- ===== تبويب لوحة المتابعة ===== -->
  <section class="panel" id="panel-dash">
    <div class="card">
      <div class="field">
        <label>من تاريخ</label>
        <input type="date" id="dash-date-from">
      </div>
      <div class="field">
        <label>إلى تاريخ</label>
        <input type="date" id="dash-date-to">
      </div>
      <div class="field">
        <label>الفصل (يمكن اختيار أكثر من فصل)</label>
        <div class="class-check-grid" id="dash-class-group">
          <label class="chk all"><input type="checkbox" id="dash-class-all" checked> كل الفصول</label>
        </div>
      </div>
      <button class="btn btn-primary" id="dash-load-btn">عرض التقرير</button>
    </div>

    <div id="dash-results" style="display:none;">
      <div class="stat-grid">
        <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">إجمالي الطلاب</div></div>
        <div class="stat present"><div class="num" id="stat-present">0</div><div class="lbl">حاضر</div></div>
        <div class="stat absent"><div class="num" id="stat-absent">0</div><div class="lbl">غائب</div></div>
        <div class="stat excused"><div class="num" id="stat-late">0</div><div class="lbl">مستأذن</div></div>
      </div>

      <div class="card">
        <p class="list-title">الطلاب الغائبون</p>
        <div id="dash-absent-list"><div class="empty">لا يوجد غياب مسجل</div></div>
      </div>
    </div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('att-date').value = today;
  document.getElementById('dash-date-from').value = today;
  document.getElementById('dash-date-to').value = today;

  // ---------- تبديل التبويبات ----------
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  function showToast(msg, isError){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(()=> t.className='toast', 2200);
  }

  // ---------- تحميل الفصول ----------
  const CLASSES = ['أولى ابتدائي','ثاني ابتدائي','ثالث ابتدائي','رابع ابتدائي','خامس ابتدائي','سادس ابتدائي'];

  const CLASS_TEACHERS = {
    'أولى ابتدائي': 'أ. أحمد نصر',
    'ثاني ابتدائي': 'أ. خالد باقطيان',
    'ثالث ابتدائي': 'أ. عبدالله فتحي',
    'رابع ابتدائي': 'أ. حسن هارون، أ. محمد هلال',
    'خامس ابتدائي': 'أ. أيمن شيخ',
    'سادس ابتدائي': 'أ. محمد عبادي، أ. عدنان عثمان'
  };

  function loadClasses(){
    const attSel = document.getElementById('att-class');
    CLASSES.forEach(c=>{
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      attSel.appendChild(opt);
    });

    const group = document.getElementById('dash-class-group');
    const allChk = document.getElementById('dash-class-all');
    const itemChecks = [];

    CLASSES.forEach(c=>{
      const label = document.createElement('label');
      label.className = 'chk';
      const input = document.createElement('input');
      input.type = 'checkbox';
      input.value = c;
      input.className = 'dash-class-item';
      label.appendChild(input);
      label.appendChild(document.createTextNode(c));
      group.appendChild(label);
      itemChecks.push(input);

      input.addEventListener('change', ()=>{
        label.classList.toggle('checked', input.checked);
        if(input.checked){ allChk.checked = false; }
        const anyChecked = itemChecks.some(c=>c.checked);
        if(!anyChecked){ allChk.checked = true; }
      });
    });

    allChk.addEventListener('change', ()=>{
      if(allChk.checked){
        itemChecks.forEach(c=>{ c.checked = false; c.closest('.chk').classList.remove('checked'); });
      } else if(!itemChecks.some(c=>c.checked)){
        allChk.checked = true;
      }
    });
  }
  loadClasses();

  function getSelectedDashClasses(){
    const allChk = document.getElementById('dash-class-all');
    if(allChk.checked) return [];
    return Array.from(document.querySelectorAll('.dash-class-item'))
      .filter(c=>c.checked).map(c=>c.value);
  }

  // ---------- تبويب الحضور ----------
  const attClass = document.getElementById('att-class');
  const attCard = document.getElementById('att-students-card');
  const attList = document.getElementById('att-students');
  const attSaveBtn = document.getElementById('att-save-btn');

  const RANDOM_NAME_POOL = [
    'عبدالله المطيري','فيصل الحربي','سلطان القحطاني','ناصر الدوسري','تركي الغامدي',
    'بندر الشهري','ماجد العنزي','يوسف السبيعي','إبراهيم الزهراني','خالد البقمي',
    'عمر الجهني','طلال الحارثي','فهد المالكي','راشد العصيمي','عبدالرحمن القرني',
    'مشعل الرشيدي','نواف الخالدي','زياد النفيعي','وليد الفيفي','أنس الشثري',
    'سلمان اليامي','ريان العواجي','آدم الحسني','لؤي الشريف','معاذ الثبيتي',
    'فارس السهلي','ياسر الحقباني','بدر السلطان','حسام العدواني','مازن العتيبي'
  ];

  function getRandomStudents(count){
    const shuffled = [...RANDOM_NAME_POOL].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, count).map((name, i) => ({ id: i + 1, name: name + ' (عشوائي)' }));
  }

  function renderAttendanceStudents(students){
    attList.innerHTML = '';
    if(!students || students.length === 0){
      attList.innerHTML = '<div class="empty">لا يوجد طلاب في هذا الفصل بعد</div>';
      attCard.style.display='block'; attSaveBtn.style.display='none';
      return;
    }
    students.forEach(s=>{
      const row = document.createElement('div');
      row.className = 'student-row';
      row.dataset.name = s.name;
      row.innerHTML =
        '<span>' + s.name + '</span>' +
        '<div class="status-group">' +
          '<span class="status-opt present selected" data-status="حاضر">حاضر</span>' +
          '<span class="status-opt excused" data-status="مستأذن">مستأذن</span>' +
          '<span class="status-opt absent" data-status="غائب">غائب</span>' +
        '</div>';
      row.querySelectorAll('.status-opt').forEach(opt=>{
        opt.addEventListener('click', ()=>{
          row.querySelectorAll('.status-opt').forEach(o=>o.classList.remove('selected'));
          opt.classList.add('selected');
        });
      });
      attList.appendChild(row);
    });
    attCard.style.display='block';
    attSaveBtn.style.display='block';
  }

  attClass.addEventListener('change', ()=>{
    const teacherHint = document.getElementById('att-teacher-hint');
    if(!attClass.value){
      attCard.style.display='none'; attSaveBtn.style.display='none';
      teacherHint.classList.remove('show');
      return;
    }

    const teacher = CLASS_TEACHERS[attClass.value];
    if(teacher){
      teacherHint.textContent = 'المعلم: ' + teacher;
      teacherHint.classList.add('show');
    } else {
      teacherHint.classList.remove('show');
    }

    // إذا كان النظام يعمل خارج بيئة Apps Script (بدون ربط بشيت)، نعرض أسماء عشوائية للتجربة
    if(typeof google === 'undefined' || !google.script || !google.script.run){
      renderAttendanceStudents(getRandomStudents(8));
      return;
    }

    google.script.run
      .withSuccessHandler(students=>{
        renderAttendanceStudents(students && students.length ? students : getRandomStudents(8));
      })
      .withFailureHandler(()=>{
        renderAttendanceStudents(getRandomStudents(8));
      })
      .getStudentsByClass(attClass.value);
  });

  attSaveBtn.addEventListener('click', ()=>{
    const date = document.getElementById('att-date').value;
    const className = attClass.value;
    const teacherName = CLASS_TEACHERS[className] || '';
    if(!date || !className){ showToast('الرجاء اختيار التاريخ والفصل', true); return; }

    const records = [];
    attList.querySelectorAll('.student-row').forEach(row=>{
      const status = row.querySelector('.status-opt.selected').dataset.status;
      records.push({ name: row.dataset.name, status });
    });

    attSaveBtn.disabled = true; attSaveBtn.textContent = 'جاري الإرسال...';
    google.script.run
      .withSuccessHandler(res=>{
        attSaveBtn.disabled = false; attSaveBtn.textContent = 'إرسال';
        showToast('تم إرسال حضور ' + res.count + ' طالباً بنجاح');
      })
      .withFailureHandler(err=>{
        attSaveBtn.disabled = false; attSaveBtn.textContent = 'إرسال';
        showToast('حدث خطأ: ' + err.message, true);
      })
      .submitAttendance({ date, className, teacherName, records });
  });

  // ---------- تبويب لوحة المتابعة ----------
  document.getElementById('dash-load-btn').addEventListener('click', function(){
    const btn = this;
    const dateFrom = document.getElementById('dash-date-from').value;
    const dateTo = document.getElementById('dash-date-to').value;
    const classNames = getSelectedDashClasses();
    if(!dateFrom || !dateTo){ showToast('الرجاء اختيار الفترة الزمنية', true); return; }
    if(dateFrom > dateTo){ showToast('تاريخ "من" يجب أن يسبق تاريخ "إلى"', true); return; }
    const multiDay = dateFrom !== dateTo;

    btn.disabled = true; btn.textContent = 'جاري التحميل...';

    google.script.run
      .withSuccessHandler(data=>{
        btn.disabled = false; btn.textContent = 'عرض التقرير';
        document.getElementById('dash-results').style.display = 'block';
        document.getElementById('stat-total').textContent = data.totalStudents;
        document.getElementById('stat-present').textContent = data.present;
        document.getElementById('stat-absent').textContent = data.absent;
        document.getElementById('stat-late').textContent = data.late;

        const absentEl = document.getElementById('dash-absent-list');
        absentEl.innerHTML = data.absentNames.length
          ? data.absentNames.map(a=>
              '<div class="list-item"><span>' + a.name + '</span>' +
              (multiDay ? '<span class="tag">' + a.date + '</span>' : '') +
              '</div>'
            ).join('')
          : '<div class="empty">لا يوجد غياب مسجل</div>';
      })
      .withFailureHandler(err=>{
        btn.disabled = false; btn.textContent = 'عرض التقرير';
        showToast('حدث خطأ: ' + err.message, true);
      })
      .getDashboardData(dateFrom, dateTo, classNames);
  });
</script>

</body>
</html>
